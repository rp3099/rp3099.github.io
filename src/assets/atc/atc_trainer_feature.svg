<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="ATC Trainer GPT - Custom GPT Evaluation">
  <defs>
    <linearGradient id="atcBgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1526"/>
      <stop offset="0.55" stop-color="#0b0c10"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
    <radialGradient id="atcGlow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#00d2ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="atcSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d2ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00d2ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#atcBgGrad)"/>
  <circle cx="600" cy="300" r="380" fill="url(#atcGlow)"/>

  <!-- Faint airway lines -->
  <g stroke="#00d2ff" stroke-opacity="0.05" stroke-width="1.5">
    <line x1="0" y1="150" x2="1200" y2="200"/>
    <line x1="0" y1="520" x2="1200" y2="450"/>
    <line x1="230" y1="0" x2="300" y2="675"/>
    <line x1="1000" y1="0" x2="930" y2="675"/>
  </g>

  <!-- Top status pill -->
  <g transform="translate(600 62)">
    <rect x="-320" y="-25" width="640" height="50" rx="25" fill="#ffffff" fill-opacity="0.05" stroke="#00d2ff" stroke-opacity="0.4"/>
    <circle cx="-288" cy="0" r="6" fill="#7ee0a1"/>
    <text x="24" y="7" text-anchor="middle" fill="#c9eef8" font-family="Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="2.5">FAA PHRASEOLOGY · SEVEN-TURN STRESS TEST</text>
  </g>

  <!-- Radar scope -->
  <g>
    <circle cx="600" cy="300" r="182" fill="none" stroke="#00d2ff" stroke-opacity="0.35" stroke-width="2"/>
    <circle cx="600" cy="300" r="132" fill="none" stroke="#00d2ff" stroke-opacity="0.15" stroke-width="1.5"/>
    <circle cx="600" cy="300" r="82" fill="none" stroke="#00d2ff" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="2 10"/>
    <line x1="600" y1="118" x2="600" y2="482" stroke="#00d2ff" stroke-opacity="0.12" stroke-width="1.5"/>
    <line x1="418" y1="300" x2="782" y2="300" stroke="#00d2ff" stroke-opacity="0.12" stroke-width="1.5"/>

    <!-- Sweep wedge -->
    <path d="M600 300 L600 118 A182 182 0 0 1 745 190 Z" fill="url(#atcSweep)"/>
    <line x1="600" y1="300" x2="600" y2="118" stroke="#00d2ff" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Verified blips -->
    <g fill="#7ee0a1">
      <circle cx="530" cy="238" r="6"/>
      <circle cx="676" cy="352" r="6"/>
      <circle cx="562" cy="386" r="5"/>
    </g>
    <text x="518" y="222" text-anchor="end" fill="#7ee0a1" fill-opacity="0.85" font-family="Menlo, Consolas, monospace" font-size="16" letter-spacing="1">120.55</text>

    <!-- Hallucinated blip: the fabricated SID -->
    <g stroke="#ff6b6b" stroke-width="3.5" stroke-linecap="round">
      <line x1="694" y1="220" x2="714" y2="240"/>
      <line x1="714" y1="220" x2="694" y2="240"/>
    </g>
    <text x="724" y="218" fill="#ff6b6b" fill-opacity="0.9" font-family="Menlo, Consolas, monospace" font-size="16" letter-spacing="1">GIPPR2?</text>
  </g>

  <!-- Range labels -->
  <text x="600" y="508" text-anchor="middle" fill="#00d2ff" fill-opacity="0.45" font-family="Menlo, Consolas, monospace" font-size="15" letter-spacing="4">KPWK → CHICAGO DEPARTURE</text>

  <!-- Title -->
  <text x="600" y="576" text-anchor="middle" fill="#ffffff" font-family="Helvetica Neue, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="6">ATC TRAINER GPT</text>
  <text x="600" y="616" text-anchor="middle" fill="#00d2ff" font-family="Helvetica Neue, Arial, sans-serif" font-size="25" font-weight="600" letter-spacing="10">CUSTOM GPT EVALUATION</text>
</svg>
