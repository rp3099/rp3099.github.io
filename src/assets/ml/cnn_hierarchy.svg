<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-label="CNN feature hierarchy from raw pixels to objects">
  <defs>
    <linearGradient id="cnnbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11121a"/>
      <stop offset="1" stop-color="#0b0c10"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" rx="10" fill="url(#cnnbg)"/>

  <!-- stage arrows -->
  <g stroke="#deb887" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M205 210 L245 210" marker-end="url(#ar)"/>
    <path d="M405 210 L445 210" marker-end="url(#ar)"/>
    <path d="M605 210 L645 210" marker-end="url(#ar)"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#deb887"/>
    </marker>
  </defs>

  <!-- Stage 1: raw pixels -->
  <g transform="translate(70 130)">
    <rect width="130" height="160" rx="6" fill="#0b0c10" stroke="#deb887" stroke-opacity="0.5"/>
    <g>
      <rect x="14" y="16" width="102" height="102" fill="none" stroke="#3a3f4a"/>
      <g stroke="#2a2e37">
        <line x1="14" y1="42" x2="116" y2="42"/><line x1="14" y1="68" x2="116" y2="68"/><line x1="14" y1="94" x2="116" y2="94"/>
        <line x1="40" y1="16" x2="40" y2="118"/><line x1="66" y1="16" x2="66" y2="118"/><line x1="90" y1="16" x2="90" y2="118"/>
      </g>
    </g>
    <text x="65" y="145" text-anchor="middle" fill="#c5c6c7" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600">Raw pixels</text>
  </g>

  <!-- Stage 2: edges -->
  <g transform="translate(270 130)">
    <rect width="130" height="160" rx="6" fill="#0b0c10" stroke="#deb887" stroke-opacity="0.5"/>
    <g stroke="#deb887" stroke-width="2" fill="none" stroke-opacity="0.85">
      <line x1="20" y1="30" x2="55" y2="70"/><line x1="60" y1="95" x2="105" y2="55"/>
      <line x1="30" y1="105" x2="95" y2="105"/><line x1="75" y1="25" x2="75" y2="90"/>
    </g>
    <text x="65" y="145" text-anchor="middle" fill="#c5c6c7" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600">Edges</text>
  </g>

  <!-- Stage 3: parts -->
  <g transform="translate(470 130)">
    <rect width="130" height="160" rx="6" fill="#0b0c10" stroke="#deb887" stroke-opacity="0.5"/>
    <g stroke="#deb887" stroke-width="2" fill="none" stroke-opacity="0.85">
      <circle cx="45" cy="50" r="16"/><circle cx="90" cy="55" r="12"/>
      <path d="M30 95 Q65 120 100 95"/>
    </g>
    <text x="65" y="145" text-anchor="middle" fill="#c5c6c7" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600">Object parts</text>
  </g>

  <!-- Stage 4: object -->
  <g transform="translate(670 130)">
    <rect width="150" height="160" rx="6" fill="#0b0c10" stroke="#deb887" stroke-width="1.5"/>
    <g stroke="#deb887" stroke-width="2.5" fill="none">
      <rect x="30" y="26" width="90" height="70" rx="4"/>
      <circle cx="55" cy="55" r="9"/><circle cx="95" cy="55" r="9"/>
      <path d="M50 80 Q75 95 100 80"/>
    </g>
    <text x="75" y="145" text-anchor="middle" fill="#deb887" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700">Whole object</text>
  </g>

  <!-- title -->
  <text x="450" y="55" text-anchor="middle" fill="#ffffff" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="1">CNN Feature Hierarchy</text>
  <text x="450" y="88" text-anchor="middle" fill="#8f9499" font-family="Helvetica Neue, Arial, sans-serif" font-size="16">Deeper layers learn increasingly abstract features — no hand-engineering required</text>
</svg>
