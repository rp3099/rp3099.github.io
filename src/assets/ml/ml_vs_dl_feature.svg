<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Machine Learning versus Deep Learning">
  <defs>
    <linearGradient id="mlbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1526"/>
      <stop offset="0.55" stop-color="#0b0c10"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
    <radialGradient id="mlglow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#deb887" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#deb887" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#mlbg)"/>
  <circle cx="600" cy="300" r="380" fill="url(#mlglow)"/>

  <!-- Left: classical ML — SVM separating hyperplane -->
  <text x="300" y="120" text-anchor="middle" fill="#deb887" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4">CLASSICAL ML · SVM</text>
  <!-- margin band -->
  <line x1="150" y1="470" x2="470" y2="180" stroke="#deb887" stroke-width="3"/>
  <line x1="120" y1="450" x2="440" y2="160" stroke="#deb887" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 8"/>
  <line x1="180" y1="490" x2="500" y2="200" stroke="#deb887" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 8"/>
  <!-- class A dots (lower-left) -->
  <g fill="#deb887">
    <circle cx="185" cy="430" r="9"/><circle cx="240" cy="450" r="9"/><circle cx="215" cy="380" r="9"/>
    <circle cx="285" cy="415" r="9"/><circle cx="160" cy="385" r="9"/>
  </g>
  <!-- class B dots (upper-right) -->
  <g fill="none" stroke="#ffffff" stroke-width="2.5">
    <circle cx="360" cy="260" r="9"/><circle cx="410" cy="290" r="9"/><circle cx="385" cy="215" r="9"/>
    <circle cx="450" cy="245" r="9"/><circle cx="330" cy="300" r="9"/>
  </g>

  <!-- Right: deep learning — neural network -->
  <text x="895" y="120" text-anchor="middle" fill="#deb887" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4">DEEP LEARNING · NN</text>
  <g stroke="#deb887" stroke-opacity="0.18" stroke-width="1.2">
    <!-- edges layer1->2 -->
    <path d="M700 230 L810 200 M700 230 L810 270 M700 230 L810 340 M700 230 L810 400
             M700 300 L810 200 M700 300 L810 270 M700 300 L810 340 M700 300 L810 400
             M700 370 L810 200 M700 370 L810 270 M700 370 L810 340 M700 370 L810 400"/>
    <!-- edges layer2->3 -->
    <path d="M810 200 L920 210 M810 200 L920 300 M810 200 L920 390
             M810 270 L920 210 M810 270 L920 300 M810 270 L920 390
             M810 340 L920 210 M810 340 L920 300 M810 340 L920 390
             M810 400 L920 210 M810 400 L920 300 M810 400 L920 390"/>
    <!-- edges layer3->out -->
    <path d="M920 210 L1030 265 M920 210 L1030 335
             M920 300 L1030 265 M920 300 L1030 335
             M920 390 L1030 265 M920 390 L1030 335"/>
  </g>
  <g fill="#0b0c10" stroke="#deb887" stroke-width="2.5">
    <circle cx="700" cy="230" r="12"/><circle cx="700" cy="300" r="12"/><circle cx="700" cy="370" r="12"/>
    <circle cx="810" cy="200" r="12"/><circle cx="810" cy="270" r="12"/><circle cx="810" cy="340" r="12"/><circle cx="810" cy="400" r="12"/>
    <circle cx="920" cy="210" r="12"/><circle cx="920" cy="300" r="12"/><circle cx="920" cy="390" r="12"/>
    <circle cx="1030" cy="265" r="12"/><circle cx="1030" cy="335" r="12"/>
  </g>

  <!-- Center divider + VS badge -->
  <line x1="600" y1="150" x2="600" y2="450" stroke="#deb887" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="2 10"/>
  <circle cx="600" cy="300" r="38" fill="#0b0c10" stroke="#deb887" stroke-width="2"/>
  <text x="600" y="309" text-anchor="middle" fill="#deb887" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="1">VS</text>

  <!-- Title -->
  <text x="600" y="575" text-anchor="middle" fill="#ffffff" font-family="Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="2">MACHINE LEARNING <tspan fill="#deb887">vs.</tspan> DEEP LEARNING</text>
  <text x="600" y="612" text-anchor="middle" fill="#8f9499" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" font-weight="500" letter-spacing="3">MATCHING MODEL COMPLEXITY TO THE PROBLEM</text>
</svg>
