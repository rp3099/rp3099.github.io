<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Static favicons (Safari-friendly ICO/PNG of the profile photo).
         Chrome/Firefox additionally get the JS-animated version at runtime. -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0c10" />
    <meta
      name="description"
      content="Portfolio of Rudra Patel — aerospace engineer specializing in flight control systems, computational fluid dynamics (CFD), and applied AI."
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Single-page-app redirect decoder for GitHub Pages deep links.
         Works with public/404.html to restore the real path after a hard load. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <title>Rudra Patel — Aerospace Engineer</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
